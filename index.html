<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sqwid Video Player</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://adsgram.ai/sdk.js"></script>
    <style>
        body { 
            background-color: #000; 
            color: #fff; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }
        #ad-container { 
            text-align: center; 
            padding: 20px; 
            max-width: 80%;
        }
        #player { 
            display: none; 
            width: 100%; 
            max-height: 100vh; 
            background: #000; 
        }
        .btn { 
            background: #248bcf; 
            border: none; 
            color: white; 
            padding: 16px 32px; 
            border-radius: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 18px;
            box-shadow: 0 4px 15px rgba(36, 139, 207, 0.3);
        }
        .btn:active {
            transform: scale(0.98);
        }
        h2 { margin-bottom: 10px; }
        p { color: #aaa; margin-bottom: 25px; }
    </style>
</head>
<body>

    <div id="ad-container">
        <h2>Content Locked</h2>
        <p>Watch a short ad to play this 30s segment</p>
        <button class="btn" onclick="playAd()">🔓 Unlock & Play</button>
    </div>

    <video id="player" controls playsinline disablePictureInPicture></video>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Opens the app to full height in Telegram

        // Initializing Adsgram with your specific Block ID
        const AdController = window.Adsgram.init({ blockId: "28865" });

        function playAd() {
            AdController.show().then((result) => {
                // User finished the ad successfully
                unlockAndPlay();
            }).catch((result) => {
                // Ad was skipped, failed, or blocked
                alert("You must watch the full ad to unlock this part.");
                console.log("Ad error:", result);
            });
        }

        function unlockAndPlay() {
            const params = new URLSearchParams(window.location.search);
            const videoId = params.get('vid');
            const part = params.get('part');
            
            if (!videoId || !part) {
                alert("Error: Missing video data in link.");
                return;
            }

            // Path to your segments folder in your GitHub repository
            const videoUrl = `https://sqwidonthebeat.github.io/Video-player-app/segments/${videoId}_part_${part}.mp4`;

            // Hide ad screen and show player
            document.getElementById('ad-container').style.display = 'none';
            const player = document.getElementById('player');
            player.style.display = 'block';
            player.src = videoUrl;
            player.load();
            player.play().catch(e => {
                console.log("Auto-play blocked, user must click play.");
            });
        }
    </script>
</body>
</html>
